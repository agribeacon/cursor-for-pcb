<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cursor-for-pcb</title>
<style>
  :root{
    --bg:#15171c; --panel:#1e2127; --panel2:#23272e; --border:#2f343d;
    --text:#e5e9f0; --muted:#7d8590; --accent:#61afef; --green:#98c379;
    --red:#e06c75; --yellow:#e5c07b; --chip:#282c34;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px}
  #app{display:grid;grid-template-rows:48px 1fr;height:100vh}
  header{display:flex;align-items:center;gap:12px;padding:0 14px;
    background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{font-weight:700;letter-spacing:.3px}
  .logo b{color:var(--accent)}
  .name{color:var(--muted);font-size:13px}
  header .spacer{flex:1}
  .btn{background:var(--accent);color:#0b1220;border:0;border-radius:6px;
    padding:7px 14px;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--chip);color:var(--text);border:1px solid var(--border)}
  main{display:grid;grid-template-columns:360px 1fr 240px;min-height:0}
  /* chat */
  .chat{display:flex;flex-direction:column;background:var(--panel);
    border-right:1px solid var(--border);min-height:0}
  .messages{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .msg{padding:9px 12px;border-radius:10px;max-width:92%;line-height:1.45;white-space:pre-wrap;position:relative}
  .msg .copy{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.25);
    border:0;color:var(--muted);font-size:11px;border-radius:5px;padding:2px 6px;
    cursor:pointer;opacity:0;transition:opacity .15s}
  .msg:hover .copy{opacity:1}
  .msg .copy:hover{color:var(--text)}
  .msg.user{align-self:flex-end;background:var(--accent);color:#0b1220}
  .msg.bot{align-self:flex-start;background:var(--chip);border:1px solid var(--border)}
  .msg.bot code{background:#0d1117;padding:1px 5px;border-radius:4px;color:var(--yellow);font-size:12px}
  .msg.bot strong{color:var(--green)}
  .activity{display:flex;flex-direction:column;gap:4px;margin:2px 0 8px}
  .act{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:5px 9px;
    background:var(--chip);border:1px solid var(--border);border-radius:8px;color:var(--muted)}
  .act .ic{flex:0 0 auto}
  .act .nm{color:var(--accent);font-weight:600;font-family:ui-monospace,Menlo,monospace}
  .act .rs{color:var(--green)}
  .act.think{color:var(--text);background:transparent;border:0;padding:2px 4px;line-height:1.4}
  .act.think .ic{color:var(--yellow)}
  .typing{display:flex;gap:5px;align-items:center}
  .typing .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);
    animation:blink 1.2s infinite both}
  .typing .dot:nth-child(2){animation-delay:.2s}
  .typing .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .composer.busy{opacity:.5;pointer-events:none}
  .btn:disabled{opacity:.5;cursor:default}
  .composer{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);align-items:flex-end}
  .composer textarea{flex:1;background:#0d1117;border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 12px;outline:none;resize:none;
    font-family:inherit;font-size:14px;line-height:1.4;max-height:160px;overflow-y:auto}
  .composer textarea:focus{border-color:var(--accent)}
  .composer .btn{padding:10px 16px}
  .starters{padding:6px 12px 10px;display:flex;flex-direction:column;gap:6px}
  .starters-title{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:2px 2px 2px}
  .starter{text-align:left;background:var(--chip);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;cursor:pointer}
  .starter:hover{border-color:var(--accent);background:#2b3340}
  /* canvas */
  .canvas{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .tabs{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);
    background:var(--panel)}
  .tab{padding:6px 14px;border-radius:6px;color:var(--muted);cursor:pointer;font-weight:600}
  .tab.active{background:var(--chip);color:var(--text)}
  .tabs .tspacer{flex:1}
  .toolgroup{display:flex;gap:3px;margin-right:8px}
  .tool{background:var(--chip);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px}
  .tool:hover{border-color:var(--accent)}
  .tool.add{color:var(--accent);font-weight:600}
  .addwrap{position:relative}
  .palette{position:absolute;top:34px;right:0;width:280px;max-height:60vh;overflow:auto;
    background:var(--panel2);border:1px solid var(--border);border-radius:8px;
    padding:8px;display:none;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .palette.open{display:block}
  .palette h4{font-size:10px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin:8px 4px 6px}
  .palette .chip{display:inline-block;background:var(--chip);border:1px solid var(--border);
    border-radius:6px;padding:5px 9px;margin:2px;font-size:12px;cursor:pointer}
  .palette .chip:hover{border-color:var(--accent);color:var(--accent)}
  .palette .chip.block{border-color:#3b5168;color:var(--green)}
  /* zoom/pan canvas */
  .view{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
  .view.panning{cursor:grabbing}
  .zoomable{position:absolute;left:50%;top:50%;transform-origin:0 0;
    will-change:transform;display:flex;align-items:center;justify-content:center}
  .view svg{display:block;background:#fff;border-radius:8px}
  #schematic-view svg{background:#1e2127}
  #pcb-view{cursor:default}
  #pcb-view kicanvas-embed{position:absolute;inset:0;width:100%;height:100%}
  .empty{color:var(--muted);text-align:center;line-height:1.6;white-space:nowrap}
  .status{display:flex;gap:18px;padding:8px 14px;border-top:1px solid var(--border);
    background:var(--panel);font-size:12px;color:var(--muted)}
  .badge{display:inline-flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%}
  .ok{background:var(--green)} .warn{background:var(--yellow)} .bad{background:var(--red)}
  /* sidebar */
  .side{background:var(--panel);border-left:1px solid var(--border);overflow:auto;padding:12px}
  .side h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:6px 0 10px}
  .obj{display:flex;justify-content:space-between;padding:8px 10px;background:var(--chip);
    border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
  .obj .ref{font-weight:700;color:var(--accent)}
  .obj .val{color:var(--green)}
  .obj .ty{color:var(--muted);font-size:11px}
  .net{padding:6px 10px;border-radius:6px;background:var(--chip);margin-bottom:5px;font-size:12px}
  .net b{color:var(--yellow)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><b>cursor</b>-for-pcb</div>
    <div class="name" id="design-name">untitled</div>
    <div class="spacer"></div>
    <button class="btn ghost" id="new-btn">＋ New</button>
    <button class="btn ghost" id="export-btn">⤓ Fab package</button>
    <button class="btn" id="build-btn">⚡ Build</button>
  </header>
  <main>
    <section class="chat">
      <div class="messages" id="messages"></div>
      <div class="starters" id="starters">
        <div class="starters-title">Quick start</div>
        <button class="starter" data-q="Design an ESP32 dev board powered from USB-C with a status LED and a reset button. Build and review it.">⚡ ESP32 dev board (USB-C)</button>
        <button class="starter" data-q="Build an ESP32 board with an I2C sensor header and 2 status LEDs. Then review it.">🔌 ESP32 + I²C + 2 LEDs</button>
        <button class="starter" data-q="Design a USB-C to 3.3V power supply with a power LED. Build and review.">🔋 USB-C → 3.3V supply</button>
        <button class="starter" data-q="Make a simple LED blinker: 5V through a 330 ohm resistor to an LED. Build it.">💡 LED blinker</button>
      </div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Describe your board…  (Enter to send, Shift+Enter for new line)"></textarea>
        <button class="btn" id="send-btn">Send</button>
      </div>
    </section>

    <section class="canvas">
      <div class="tabs">
        <div class="tab active" data-tab="schematic">Schematic</div>
        <div class="tab" data-tab="pcb">PCB</div>
        <div class="tspacer"></div>
        <div class="toolgroup">
          <button class="tool" id="zoom-out" title="Zoom out">−</button>
          <button class="tool" id="zoom-in" title="Zoom in">＋</button>
          <button class="tool" id="zoom-fit" title="Fit">⊡ Fit</button>
        </div>
        <div class="addwrap">
          <button class="tool add" id="add-btn">＋ Add ▾</button>
          <div class="palette" id="palette"></div>
        </div>
      </div>
      <div class="view" id="schematic-view">
        <div class="zoomable"><div class="empty">No schematic yet.<br/>Try <b>load usb</b> or the <b>＋ Add</b> palette.</div></div>
      </div>
      <div class="view" id="pcb-view" style="display:none">
        <div class="zoomable"><div class="empty">No board yet.<br/>Click <b>⚡ Build</b> to generate the PCB.</div></div>
      </div>
      <div class="status" id="status">
        <span class="badge"><span class="dot warn"></span><span id="erc">ERC —</span></span>
        <span class="badge"><span class="dot warn"></span><span id="drc">DRC —</span></span>
        <span class="badge"><span class="dot warn"></span><span id="route">Route —</span></span>
        <span class="badge"><span class="dot warn"></span><span id="grade">Review —</span></span>
        <span class="badge"><span class="dot warn"></span><span id="sim">Sim —</span></span>
        <span class="badge" id="counts">0 parts · 0 nets</span>
      </div>
    </section>

    <aside class="side">
      <h3>Components</h3>
      <div id="objects"></div>
      <h3 style="margin-top:18px">Nets</h3>
      <div id="nets"></div>
    </aside>
  </main>
</div>

<script>
const $ = (s)=>document.querySelector(s);
const messages = $("#messages");

function md(t){
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>");
}
function addMsg(text, who){
  const d=document.createElement("div");
  d.className="msg "+who;
  d.innerHTML=who==="bot"?md(text):md(String(text).replace(/</g,"&lt;"));
  const cp=document.createElement("button");
  cp.className="copy"; cp.textContent="Copy";
  cp.onclick=()=>{navigator.clipboard.writeText(text);
    cp.textContent="Copied"; setTimeout(()=>cp.textContent="Copy",1200);};
  d.appendChild(cp);
  messages.appendChild(d); messages.scrollTop=messages.scrollHeight;
  return d;
}
function showTyping(){
  const d=document.createElement("div");
  d.className="msg bot"; d.id="typing";
  d.innerHTML='<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  messages.appendChild(d); messages.scrollTop=messages.scrollHeight;
}
function hideTyping(){const t=$("#typing"); if(t) t.remove();}

let activeTab="schematic";
function setTab(name){
  activeTab=name;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  $("#schematic-view").style.display = name==="schematic"?"block":"none";
  $("#pcb-view").style.display = name==="pcb"?"block":"none";
  applyView();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

/* ---- pan + zoom -------------------------------------------------------- */
const views={schematic:{x:0,y:0,s:1,fitted:false},pcb:{x:0,y:0,s:1,fitted:false}};
function viewEl(){return $(activeTab==="schematic"?"#schematic-view":"#pcb-view");}
function zoomEl(){return viewEl().querySelector(".zoomable");}
function applyView(){
  const z=zoomEl(); if(!z) return;   // PCB uses KiCanvas — no transform layer
  const v=views[activeTab];
  z.style.transform=`translate(${v.x}px,${v.y}px) scale(${v.s})`;
}
function fitView(){
  const view=viewEl(), z=zoomEl();
  if(!z) return;
  const svg=z.querySelector("svg");
  const v=views[activeTab];
  if(!svg){v.x=v.y=0;v.s=1;applyView();return;}
  const vw=view.clientWidth-40, vh=view.clientHeight-40;
  const sw=svg.getBBox?svg.getBoundingClientRect().width/v.s:svg.clientWidth;
  const sh=svg.getBoundingClientRect().height/v.s;
  const s=Math.min(vw/sw, vh/sh, 4)||1;
  v.s=s; v.x=-sw*s/2; v.y=-sh*s/2; v.fitted=true; applyView();
}
function zoomBy(f, cx, cy){
  if(!zoomEl()) return;              // PCB uses KiCanvas's own zoom
  const view=viewEl(), v=views[activeTab];
  const r=view.getBoundingClientRect();
  cx=(cx??r.width/2); cy=(cy??r.height/2);
  // keep the point under the cursor stable
  const ox=cx-r.width/2-v.x, oy=cy-r.height/2-v.y;
  const ns=Math.min(Math.max(v.s*f,.1),8);
  const k=ns/v.s; v.x-=ox*(k-1); v.y-=oy*(k-1); v.s=ns; applyView();
}
function bindPanZoom(view){
  view.addEventListener("wheel",e=>{e.preventDefault();
    zoomBy(e.deltaY<0?1.12:1/1.12, e.clientX-view.getBoundingClientRect().left,
           e.clientY-view.getBoundingClientRect().top);},{passive:false});
  let drag=null;
  view.addEventListener("mousedown",e=>{drag={x:e.clientX,y:e.clientY};view.classList.add("panning");});
  window.addEventListener("mousemove",e=>{if(!drag)return;
    const v=views[activeTab]; v.x+=e.clientX-drag.x; v.y+=e.clientY-drag.y;
    drag={x:e.clientX,y:e.clientY}; applyView();});
  window.addEventListener("mouseup",()=>{drag=null;view.classList.remove("panning");});
}
bindPanZoom($("#schematic-view")); bindPanZoom($("#pcb-view"));
$("#zoom-in").onclick=()=>zoomBy(1.25);
$("#zoom-out").onclick=()=>zoomBy(1/1.25);
$("#zoom-fit").onclick=fitView;

function render(state){
  const d=state.design;
  $("#design-name").textContent=d.name;
  // schematic → my zoomable SVG layer
  $("#schematic-view .zoomable").innerHTML = state.schematic_svg
    || '<div class="empty">No schematic yet.</div>';
  // PCB → kicad-cli's own SVG render (reliable), in the zoomable layer
  $("#pcb-view .zoomable").innerHTML = state.pcb_svg
    || '<div class="empty">No board yet.<br/>Click <b>⚡ Build</b> to generate the PCB.</div>';
  requestAnimationFrame(()=>{ views[activeTab].fitted=false; fitView(); });
  // objects
  $("#objects").innerHTML = d.components.map(c=>
    `<div class="obj"><div><div class="ref">${c.ref}</div>
     <div class="ty">${c.type}</div></div><div class="val">${c.value||""}</div></div>`).join("")
    || '<div class="empty" style="font-size:12px">no parts</div>';
  // nets
  $("#nets").innerHTML = d.nets.map(n=>
    `<div class="net"><b>${n.name}</b> · ${n.nodes.map(x=>x.ref+"."+x.pin).join(", ")}</div>`).join("")
    || '<div class="empty" style="font-size:12px">no nets</div>';
  // counts
  $("#counts").textContent = `${d.components.length} parts · ${d.nets.length} nets`;
  // build badges
  const b=state.build;
  const ercDot=$("#status .badge:nth-child(1) .dot"), drcDot=$("#status .badge:nth-child(2) .dot"),
        rtDot=$("#status .badge:nth-child(3) .dot"), gdDot=$("#status .badge:nth-child(4) .dot"),
        simDot=$("#status .badge:nth-child(5) .dot");
  if(b){
    $("#erc").textContent=`ERC ${b.erc_errors} err · ${b.erc_warnings} warn`;
    ercDot.className="dot "+(b.erc_errors?"bad":"ok");
    $("#drc").textContent=`DRC ${b.drc_violations} viol · ${b.drc_unconnected} unconn`;
    drcDot.className="dot "+(b.drc_unconnected?"bad":(b.drc_violations?"warn":"ok"));
    $("#route").textContent=`Route ${b.tracks||0} tracks · ${b.vias||0} vias`;
    rtDot.className="dot "+(b.unrouted?"warn":"ok");
    const rv=b.review||{};
    $("#grade").textContent=`Review ${rv.grade||"—"} (${rv.score||0}/${rv.max_score||0})`;
    gdDot.className="dot "+(rv.errors?"bad":(rv.grade==="A"?"ok":"warn"));
    const sm=b.simulation||{};
    if(sm.ok){
      const v=sm.voltages||{}, rail=v["3V3"]||v["5V"]||v["VBUS"]||v["VIN"];
      const simErr=(sm.findings||[]).some(f=>f.severity==="error");
      $("#sim").textContent="Sim "+(rail!=null?rail.toFixed(2)+"V":"ran")+(simErr?" ⚠":" ✓");
      simDot.className="dot "+(simErr?"bad":"ok");
    }else{ $("#sim").textContent="Sim —"; simDot.className="dot warn"; }
    if(state.pcb_svg) setTab("pcb");
  }else{
    $("#erc").textContent="ERC —"; $("#drc").textContent="DRC —"; $("#route").textContent="Route —";
    $("#grade").textContent="Review —"; $("#sim").textContent="Sim —";
    ercDot.className="dot warn"; drcDot.className="dot warn"; rtDot.className="dot warn";
    gdDot.className="dot warn"; simDot.className="dot warn";
  }
}

let sending=false;
function setBusy(b){
  sending=b;
  $(".composer").classList.toggle("busy",b);
  $("#send-btn").disabled=b; $("#build-btn").disabled=b;
}
const TOOL_ICON={add_part:"➕",add_block:"🧩",connect:"🔗",build:"⚡",
  review_design:"🔎",new_design:"📄",load_example:"📦",remove_part:"➖",
  export_gerbers:"⤓",list_blocks:"📚",list_part_types:"📚",get_design:"👁",export_bom:"📋"};
function actEl(){ // the live activity container shown above the typing dots
  let a=$("#activity");
  if(!a){a=document.createElement("div");a.id="activity";a.className="activity";
    messages.appendChild(a);}
  return a;
}
function pushActivity(ev){
  const a=actEl();
  if(ev.type==="text"){
    const d=document.createElement("div"); d.className="act think";
    d.innerHTML=`<span class="ic">💭</span><span>${md(String(ev.text).replace(/</g,"&lt;"))}</span>`;
    a.appendChild(d);
  }else if(ev.type==="tool"){
    const d=document.createElement("div"); d.className="act"; d.dataset.tool=ev.name;
    const ic=TOOL_ICON[ev.name]||"🔧";
    d.innerHTML=`<span class="ic">${ic}</span><span class="nm">${ev.name}</span>`
      +(ev.arg?` <span>${ev.arg}</span>`:"")+` <span class="rs" data-rs></span>`;
    a.appendChild(d);
  }else if(ev.type==="tool_result"){
    const rows=a.querySelectorAll(`.act[data-tool="${ev.name}"]`);
    const last=rows[rows.length-1];
    if(last){const rs=last.querySelector("[data-rs]"); if(rs) rs.textContent="→ "+ev.summary;}
  }
  messages.scrollTop=messages.scrollHeight;
}
async function send(text){
  if(sending) return;          // guard against double-submit
  setBusy(true);
  addMsg(text,"user");
  const old=$("#activity"); if(old) old.remove();
  showTyping();
  try{
    const r=await fetch("/api/chat_stream",{method:"POST",
      headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    const reader=r.body.getReader(), dec=new TextDecoder();
    let buf="", final=null;
    while(true){
      const {value,done}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf("\n\n"))>=0){
        const line=buf.slice(0,i).trim(); buf=buf.slice(i+2);
        if(!line.startsWith("data:")) continue;
        const ev=JSON.parse(line.slice(5).trim());
        if(ev.type==="done") final=ev; else pushActivity(ev);
      }
    }
    hideTyping();
    const act=$("#activity"); if(act) act.removeAttribute("id"); // keep as history
    if(final){ addMsg(final.reply,"bot"); render(final.state); }
  }catch(e){ hideTyping(); addMsg("⚠️ "+e,"bot"); }
  finally{ setBusy(false); $("#input").focus(); }
}
async function build(){
  if(sending) return;
  setBusy(true);
  addMsg("Building…","user");
  showTyping();
  try{
    const r=await fetch("/api/build",{method:"POST"});
    const data=await r.json();
    hideTyping();
    const b=data.state.build;
    addMsg(b && b.ok ? `✅ Built **${b.name}** — ERC ${b.erc_errors} errors, DRC ${b.drc_violations} violations, ${b.tracks} tracks.`
      : `⚠️ Build issues: ${(b&&b.errors||[]).join("; ")||"see status"}.`,"bot");
    render(data.state);
  }catch(e){ hideTyping(); addMsg("⚠️ "+e,"bot"); }
  finally{ setBusy(false); }
}
async function newConversation(){
  if(sending) return;
  await fetch("/api/new",{method:"POST"});
  messages.innerHTML="";
  $("#starters").style.display="";   // show quick-start again
  addMsg("New design started. What do you want to build?","bot");
  fetch("/api/state").then(r=>r.json()).then(render);
}

const input=$("#input");
function autoGrow(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,160)+"px";}
input.addEventListener("input",autoGrow);
function submitChat(){
  const v=input.value.trim();
  if(!v) return;
  input.value=""; autoGrow();
  $("#starters").style.display="none";
  send(v);
}
$("#send-btn").onclick=submitChat;
// Enter sends, Shift+Enter = newline. Ignore Enter while the IME is composing
// (Vietnamese/CJK input fires a second Enter keydown on commit → double send).
input.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey && !e.isComposing && e.keyCode!==229){
    e.preventDefault(); submitChat();
  }
});
document.querySelectorAll(".starter").forEach(b=>b.onclick=()=>{
  $("#starters").style.display="none"; send(b.dataset.q);
});
$("#build-btn").onclick=build;
$("#new-btn").onclick=newConversation;
async function exportFab(){
  if(sending) return;
  setBusy(true); addMsg("Generating fab package (Gerbers + drill + Pick&Place + BOM)…","bot");
  try{
    const r=await fetch("/api/fab",{method:"POST"});
    if(!r.ok){addMsg("⚠️ Build a board first.","bot");return;}
    const blob=await r.blob();
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=($("#design-name").textContent||"board")+"_fab.zip";
    a.click(); URL.revokeObjectURL(a.href);
    addMsg("✅ Downloaded fab package — ready to send to a PCB house.","bot");
  }catch(e){ addMsg("⚠️ "+e,"bot"); }
  finally{ setBusy(false); }
}
$("#export-btn").onclick=exportFab;

/* ---- Add palette (manual part/block insertion) ------------------------ */
const palette=$("#palette");
$("#add-btn").onclick=(e)=>{e.stopPropagation();palette.classList.toggle("open");};
document.addEventListener("click",e=>{if(!palette.contains(e.target)&&e.target!==$("#add-btn"))palette.classList.remove("open");});
async function addItem(kind,name){
  const r=await fetch("/api/add",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({kind,name})});
  const data=await r.json();
  if(data.error){addMsg("⚠️ "+data.error,"bot");return;}
  render(data.state);
  addMsg(`➕ ${data.message} — click **⚡ Build** when ready.`,"bot");
}
fetch("/api/parts").then(r=>r.json()).then(p=>{
  let html='<h4>Blocks (recommended)</h4>';
  (p.blocks||[]).forEach(b=>html+=`<span class="chip block" title="${(b.help||'').replace(/"/g,'')}" data-k="block" data-n="${b.name}">${b.name}</span>`);
  html+='<h4>Parts</h4>';
  (p.parts||[]).forEach(t=>html+=`<span class="chip" data-k="part" data-n="${t.type}">${t.type}</span>`);
  palette.innerHTML=html;
  palette.querySelectorAll(".chip").forEach(c=>c.onclick=()=>addItem(c.dataset.k,c.dataset.n));
});

addMsg("Hi! I'm your PCB copilot. Describe a board, or use **＋ Add** to drop in parts/blocks, then **⚡ Build**. Scroll to zoom, drag to pan.","bot");
fetch("/api/state").then(r=>r.json()).then(render);
</script>
